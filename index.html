<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="GravityFit — Tu tracker de entrenamiento personal. Construye rutinas, registra tus entrenamientos y sigue tu progreso.">
  <meta name="theme-color" content="#F5F5F5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GravityFit">
  <title>GravityFit — Workout Tracker</title>
  <!-- VitePWA injects the manifest automatically -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/screens.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏋️</text></svg>">
  <link rel="apple-touch-icon" href="/icons/icon-180.png">
  <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png">
</head>
<body>
  <!-- ERROR CATCHER -->
  <div id="error-log" style="position:fixed;top:0;left:0;width:100%;background:red;color:white;z-index:9999;padding:10px;display:none;white-space:pre-wrap;font-family:monospace;font-size:12px;"></div>
  <script>
    window.onerror = function(msg, url, line, col, error) {
      const el = document.getElementById('error-log');
      el.style.display = 'block';
      el.innerHTML += msg + ' at ' + url + ':' + line + ':' + col + '\n';
    };
  </script>

  <!-- Splash Screen -->
  <div id="splash-screen">
    <div class="splash-content">
      <div class="splash-icon">🏋️</div>
      <div class="splash-title">GravityFit</div>
      <div class="splash-subtitle">Workout Tracker</div>
      <div class="splash-loader"><div class="splash-loader-bar"></div></div>
    </div>
  </div>

  <div id="app">
    <!-- Screens -->
    <div id="screen-home" class="screen active"></div>
    <div id="screen-workout" class="screen"></div>
    <div id="screen-routines" class="screen"></div>
    <div id="screen-history" class="screen"></div>
    <div id="screen-exercises" class="screen"></div>
    <div id="screen-profile" class="screen"></div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav" id="bottom-nav">
      <div class="nav-item active" data-screen="home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Inicio</span>
      </div>
      <div class="nav-item" data-screen="routines">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        <span>Rutinas</span>
      </div>
      <div class="nav-item" data-screen="workout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <span>Entrenar</span>
      </div>
      <div class="nav-item" data-screen="history">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <span>Historial</span>
      </div>
      <div class="nav-item" data-screen="profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Perfil</span>
      </div>
    </nav>

    <!-- Modal Overlay -->
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal" id="modal-container"></div>
    </div>

    <!-- Rest Timer Overlay -->
    <div class="rest-timer-overlay" id="rest-timer-overlay"></div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- PR Celebration Overlay -->
    <canvas id="confetti-canvas"></canvas>
    <div class="pr-celebration" id="pr-celebration"></div>

    <!-- Badge Celebration Overlay -->
    <div class="badge-celebration" id="badge-celebration"></div>

    <!-- Onboarding Overlay -->
    <div class="onboarding-overlay" id="onboarding-overlay"></div>

    <!-- Rest Day Overlay -->
    <div class="rest-day-overlay" id="rest-day-overlay">
      <div class="rest-day-content">
        <div class="rest-day-icon">💤</div>
        <div class="rest-day-title">Día de Descanso</div>
        <div class="rest-day-subtitle">El descanso también es parte del entrenamiento. ¡Recupérate y vuelve más fuerte!</div>
        <button class="btn btn-primary btn-lg" onclick="App.dismissRestDay()">Entendido 💪</button>
        <div class="rest-day-reminder">🏆 Tu racha se mantiene</div>
      </div>
    </div>

    <!-- PWA Install Banner -->
    <div class="pwa-install-banner" id="pwa-install-banner">
      <div class="pwa-install-content">
        <div class="pwa-install-icon">🏋️</div>
        <div class="pwa-install-text">
          <div class="pwa-install-title">Instala GravityFit</div>
          <div class="pwa-install-desc">Agrega a tu pantalla de inicio</div>
        </div>
        <button class="pwa-install-btn" onclick="App.installApp()">Instalar</button>
        <button class="pwa-install-close" onclick="this.closest('.pwa-install-banner').classList.remove('visible')">✕</button>
      </div>
    </div>
  </div>

  <!-- Firebase SDK (Compat) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  
  <!-- Vite entry point (bundles all modules including exercise data) -->
  <script type="module" src="/src/main.js"></script>
</body>
</html>
