<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#0D0D0D"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#00D4AA"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Dumbbell icon -->
  <g transform="translate(256,256)">
    <!-- Bar -->
    <rect x="-120" y="-12" width="240" height="24" rx="6" fill="url(#accent)" opacity="0.9"/>
    <!-- Left weight plates -->
    <rect x="-160" y="-40" width="40" height="80" rx="8" fill="#6C63FF"/>
    <rect x="-175" y="-32" width="15" height="64" rx="4" fill="#8B83FF"/>
    <!-- Right weight plates -->
    <rect x="120" y="-40" width="40" height="80" rx="8" fill="#00D4AA"/>
    <rect x="160" y="-32" width="15" height="64" rx="4" fill="#00E8B8"/>
    <!-- Star/sparkle accent -->
    <circle cx="-130" cy="-60" r="8" fill="#FFD700" opacity="0.6"/>
    <circle cx="130" cy="-60" r="6" fill="#FFD700" opacity="0.4"/>
    <circle cx="0" cy="-45" r="4" fill="#fff" opacity="0.3"/>
  </g>
</svg>
